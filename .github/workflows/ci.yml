name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Build backend
        run: |
          dotnet restore src/FoodTour.Api
          dotnet build src/FoodTour.Api --configuration Release
      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build
